<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANTAGE | Layout: Bento Grid</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f5f5f5;
            --surface: #ffffff;
            --text: #1a1a1a;
            --accent: #c9a07a;
            --border: rgba(0, 0, 0, 0.05);
            --transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 4rem;
        }

        .header { margin-bottom: 4rem; display: flex; justify-content: space-between; align-items: flex-end; }
        .brand { font-size: 2rem; font-weight: 800; letter-spacing: -2px; }
        .tag { font-size: 0.8rem; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); font-weight: 700; }

        /* --- BENTO GRID LAYOUT --- */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 400px);
            gap: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .bento-card {
            background: var(--surface);
            border-radius: 32px;
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            transition: transform var(--transition), box-shadow var(--transition);
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .bento-card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 40px 80px rgba(0,0,0,0.08);
        }

        /* Span Logic */
        .card-large { grid-column: span 2; grid-row: span 2; }
        .card-wide { grid-column: span 2; }
        .card-tall { grid-row: span 2; }

        .card-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1; transition: transform 0.8s ease;
        }

        .bento-card:hover .card-img { transform: scale(1.08); }

        .card-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 60%);
            z-index: 2;
        }

        .card-content { position: relative; z-index: 3; color: white; }

        .card-name { font-size: 2rem; font-weight: 600; margin-bottom: 0.5rem; }
        .card-price { font-size: 1.2rem; opacity: 0.8; font-weight: 300; }

        .card-large .card-name { font-size: 3.5rem; letter-spacing: -2px; }

        @media (max-width: 1100px) {
            .bento-grid {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: auto;
            }
            .card-large { grid-column: span 2; grid-row: span 1; height: 500px; }
            body { padding: 2rem; }
        }

        @media (max-width: 600px) {
            .bento-grid { grid-template-columns: 1fr; }
            .card-large, .card-wide, .card-tall { grid-column: span 1; grid-row: span 1; height: 400px; }
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="brand">VANTAGE.BENTO</div>
        <div class="tag">The Curation</div>
    </header>

    <div class="bento-grid">
        <!-- Main Feature -->
        <div class="bento-card card-large">
            <img class="card-img" src="https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?auto=format&fit=crop&q=80&w=1200">
            <div class="card-overlay"></div>
            <div class="card-content">
                <h2 class="card-name">Signature Obsidian</h2>
                <p class="card-price">$4.50 — Guatemala Antigua</p>
            </div>
        </div>

        <!-- Wide Item -->
        <div class="bento-card card-wide">
            <img class="card-img" src="https://images.unsplash.com/photo-1555507036-ab1f4038808a?auto=format&fit=crop&q=80&w=1200">
            <div class="card-overlay"></div>
            <div class="card-content">
                <h2 class="card-name">72-Layer Croissant</h2>
                <p class="card-price">$6.50 — Isigny Butter</p>
            </div>
        </div>

        <!-- Single Item -->
        <div class="bento-card">
            <img class="card-img" src="https://images.unsplash.com/photo-1570968915860-54d5c301fa9f?auto=format&fit=crop&q=80&w=600">
            <div class="card-overlay"></div>
            <div class="card-content">
                <h2 class="card-name">Yuzu Cube</h2>
                <p class="card-price">$8.00</p>
            </div>
        </div>

        <!-- Single Item -->
        <div class="bento-card">
            <img class="card-img" src="https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&q=80&w=600">
            <div class="card-overlay"></div>
            <div class="card-content">
                <h2 class="card-name">Martini</h2>
                <p class="card-price">$16.00</p>
            </div>
        </div>
    </div>
</body>

</html>
